<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | VibeNation - Page Not Found</title>
  <style>
    body {
      background-color: #002b24;
      /* Your Brand Deep Green */
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 8rem;
      margin: 0;
      color: rgba(255, 255, 255, 0.05);
      font-weight: 900;
    }

    h2 {
      font-size: 1.8rem;
      margin-top: -30px;
      margin-bottom: 20px;
    }

    p {
      color: #a1c2be;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 35px;
      background-color: #ffffff;
      color: #002b24;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border: 2px solid #ffffff;
    }

    .btn:hover {
      transform: translateY(-3px);
      background-color: #008080;
      color: #ffffff;
      border-color: #008080;
      box-shadow: 0 10px 20px rgba(0, 128, 128, 0.3);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>
    <h2>😢 Oops! This vibe wasn't found.</h2>
    <p>The news story or music update you’re looking for might have moved, been deleted, or never existed in the first
      place.</p>
    <a href="/" class="btn">Back to Latest News</a>
  </div>
</body>

</html>
