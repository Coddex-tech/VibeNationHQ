{% extends "admin/index.html" %}

{% block content %}

<!-- DASHBOARD STATS CARDS -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

    {% for stat in dashboard_stats %}
    <div class="rounded-2xl border border-white/10 bg-[#1e1b2e] p-6 shadow-lg">

        <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-medium text-gray-300 tracking-wide uppercase">
                {{ stat.title }}
            </h3>

            <span class="material-symbols-outlined text-purple-400 text-3xl">
                {{ stat.icon }}
            </span>
        </div>

        <div class="text-4xl font-bold text-white">
            {{ stat.metric }}
        </div>

        <div class="text-sm text-gray-400 mt-3">
            {{ stat.footer }}
        </div>

    </div>
    {% endfor %}

</div>


<!-- ANALYTICS CHART -->
 {% if request.user.is_superuser %}
<div class="rounded-2xl border border-white/10 bg-[#1e1b2e] p-6 shadow-lg mb-6">

    <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-semibold text-white">
            Weekly Platform Analytics
        </h2>

        <span class="text-sm text-gray-400">
            Last 7 Days
        </span>
    </div>

    <!-- FIXED HEIGHT CONTAINER (IMPORTANT) -->
    <div style="height: 280px; position: relative;">
        <canvas id="analyticsChart"></canvas>
    </div>

</div>
{% endif %}

<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById('analyticsChart');

    const chartData = {{ chart_data|safe }};

    new Chart(ctx, {
        type: 'line',

        data: {
            labels: chartData.labels,

            datasets: chartData.datasets.map(ds => ({

                label: ds.label,
                data: ds.data,

                borderColor: ds.label === 'Uploads' ? '#22c55e' : '#3b82f6',

                backgroundColor: ds.label === 'Uploads'
                    ? 'rgba(34, 197, 94, 0.15)'
                    : 'rgba(59, 130, 246, 0.15)',

                tension: 0.4,
                fill: true,

                pointRadius: 3,
                pointHoverRadius: 6,
            }))
        },

        options: {
            responsive: true,
            maintainAspectRatio: false,

            interaction: {
                mode: 'index',
                intersect: false,
            },

            plugins: {
                legend: {
                    labels: {
                        color: '#d1d5db',
                        usePointStyle: true,
                        padding: 12
                    }
                },

                tooltip: {
                    backgroundColor: 'rgba(0,0,0,0.85)',
                    titleColor: '#ffffff',
                    bodyColor: '#d1d5db',
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1,
                    padding: 10
                }
            },

            scales: {

                x: {
                    ticks: {
                        color: '#9ca3af'
                    },
                    grid: {
                        color: 'rgba(255,255,255,0.05)'
                    }
                },

                y: {
                    beginAtZero: true,

                    ticks: {
                        color: '#9ca3af'
                    },
                    grid: {
                        color: 'rgba(255,255,255,0.05)'
                    }
                }

            }
        }
    });
</script>

{{ block.super }}

{% endblock %}
